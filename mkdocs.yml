site_name: BlissRoms Docs
site_url: https://docs.blissroms.org
repo_url: https://github.com/BlissRoms/Documentation

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - scheme: slate
      primary: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy

extra:
  social:
    - icon: fontawesome/solid/house
      link: https://blissroms.org
      name: Website
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/Bliss_ROMs
      name: Twitter
    - icon: fontawesome/brands/telegram
      link: https://t.me/BlissROM_Updates
      name: Telegram
    - icon: fontawesome/brands/github
      link: https://github.com/BlissRoms
      name: Source

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/header.js

copyright: © Copyright 2013-2026 – <a href="https://blisslabs.org">BlissLabs</a> – All rights reserved

nav:
  - Home: index.md
  - Getting Started:
    - Introduction: getting-started/introduction.md
    - Preparations: getting-started/preparations.md
    - Setting Up Environment: getting-started/installations.md
    - Build Initialization: getting-started/build.md
    - Conclusion: getting-started/conclusion.md
    - Troubleshooting: getting-started/troubleshoot.md
  - Device Customizations:
    - General Overlays: device-customizations/general_overlays.md
    - UDFPS Overlays: device-customizations/UDFPS-overlays.md
  - Maintainers:
    - Requirements: maintainers/requirements.md
  - Code of Conduct: code-of-conduct.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true
